name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  # actions: write — upload Playwright diagnostics on live e2e failure
  actions: write
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      # Required when affected packages run OpenCode integration tests.
      # Resolve the release via authenticated GitHub API then pin the installer
      # --version flag: bare `opencode.ai/install` hits unauthenticated
      # /releases/latest and fails under Actions rate limits.
      - name: Install OpenCode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anomalyco/opencode/releases/latest \
            | sed -n 's/.*"tag_name": *"v\([^"]*\)".*/\1/p')
          test -n "$VERSION"
          curl -fsSL https://opencode.ai/install | bash -s -- --version "$VERSION" --no-modify-path
      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Connect your workspace by running "nx connect" and uncomment this line to enable task distribution
      # - run: bunx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      - run: bun install --no-cache --frozen-lockfile --linker=isolated && bun install --no-cache --frozen-lockfile --linker=isolated
      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      # - run: bun nx record -- echo Hello World
      # Push to main: affected quality gates. Manual release dispatch: full suite.
      - name: Quality gates
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bun nx run-many -t lint knip test typecheck
          else
            bun nx affected -t lint knip test typecheck
          fi

      # Dev-path GraphQL smoke (Bun + Vite SSR); no Keymaxxer vault required.
      # Production live e2e below remains vault-backed and separate.
      - name: Harness dev smoke
        run: bunx nx run harness:smoke

      # Live Gherkin e2e: trusted main only (this workflow). Never on PR (pr.yml).
      - name: Require live e2e vault key
        env:
          E2E_KEYMAXXER_MASTER_KEY: ${{ secrets.E2E_KEYMAXXER_MASTER_KEY }}
        run: |
          if [ -z "${E2E_KEYMAXXER_MASTER_KEY}" ]; then
            echo "error: repository secret E2E_KEYMAXXER_MASTER_KEY is required for the live Harness e2e step" >&2
            exit 1
          fi

      - name: Install Playwright Chromium
        working-directory: apps/harness
        run: bunx playwright install --with-deps chromium

      - name: Live Harness e2e
        id: live-e2e
        env:
          E2E_KEYMAXXER_MASTER_KEY: ${{ secrets.E2E_KEYMAXXER_MASTER_KEY }}
          KEYMAXXER_MASTER_KEY: ${{ secrets.E2E_KEYMAXXER_MASTER_KEY }}
          KEYMAXXER_APPROVE: deny
        run: bunx nx run harness:e2e

      - name: Upload Playwright diagnostics
        if: failure() && steps.live-e2e.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            apps/harness/playwright-report/
            apps/harness/test-results/
          if-no-files-found: ignore
          retention-days: 14

      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      # - run: bun nx fix-ci
      #   if: always()

  # Distribution-boundary gate: pack launcher + host platform package, install
  # outside the checkout, run without Bun/Nx. Complementary to live Gherkin e2e.
  packed-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "26"

      # Required host tool for product preflight (ambient-auth smoke).
      - name: Install OpenCode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anomalyco/opencode/releases/latest \
            | sed -n 's/.*"tag_name": *"v\([^"]*\)".*/\1/p')
          test -n "$VERSION"
          curl -fsSL https://opencode.ai/install | bash -s -- --version "$VERSION" --no-modify-path
      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - run: bun install --no-cache --frozen-lockfile --linker=isolated && bun install --no-cache --frozen-lockfile --linker=isolated

      - name: Packed-install Harness smoke
        id: packed-install
        env:
          PACKED_INSTALL_DIAGNOSTICS_DIR: ${{ runner.temp }}/packed-install-diagnostics
        run: bunx nx run ready-for-agent:packed-install-smoke

      - name: Upload packed-install diagnostics
        if: failure() && steps.packed-install.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packed-install-diagnostics
          path: ${{ runner.temp }}/packed-install-diagnostics/
          if-no-files-found: ignore
          retention-days: 14

  release:
    # Manual release only, from main (never on PR/push).
    # Requires quality gates + packed-install distribution smoke before publish.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: [main, packed-install]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "26"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --no-cache --frozen-lockfile --linker=isolated && bun install --no-cache --frozen-lockfile --linker=isolated

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(bun --conditions @ready-for-agent/source packages/release-versioning/src/bin/compute-next-version.ts)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${VERSION}"

      - name: Apply publish versions
        run: |
          bun --conditions @ready-for-agent/source \
            packages/release-versioning/src/bin/apply-publish-versions.ts \
            "${{ steps.version.outputs.version }}" \
            --for-publish

      - name: Compile platform binaries
        run: |
          set -euo pipefail
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            bunx nx run ready-for-agent:compile --platform="${platform}"
          done
          # Cross-compiled packages: structural validation only (file + executable).
          # Full runtime smoke runs on the host platform via packed-install-smoke.
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            binary="packages/ready-for-agent-${platform}/bin/ready-for-agent"
            test -f "${binary}"
            test -x "${binary}"
          done

      # Re-run distribution smoke against versioned release binaries before publish.
      - name: Install OpenCode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anomalyco/opencode/releases/latest \
            | sed -n 's/.*"tag_name": *"v\([^"]*\)".*/\1/p')
          test -n "$VERSION"
          curl -fsSL https://opencode.ai/install | bash -s -- --version "$VERSION" --no-modify-path
      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Host packed-install smoke (release artifacts)
        id: release-packed-install
        env:
          PACKED_INSTALL_DIAGNOSTICS_DIR: ${{ runner.temp }}/packed-install-diagnostics
        run: bunx nx run ready-for-agent:packed-install-smoke --args=--skip-compile

      - name: Upload release packed-install diagnostics
        if: failure() && steps.release-packed-install.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-packed-install-diagnostics
          path: ${{ runner.temp }}/packed-install-diagnostics/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish packages to npm (OIDC + provenance)
        run: |
          set -euo pipefail
          # Platform packages first so optionalDependencies resolve on install.
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            (
              cd "packages/ready-for-agent-${platform}"
              npm publish --access public --provenance
            )
          done
          (
            cd apps/ready-for-agent
            npm publish --access public --provenance
          )

      - name: Create git tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

          mkdir -p dist-release
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp "packages/ready-for-agent-${platform}/bin/ready-for-agent" \
              "dist-release/ready-for-agent-${platform}"
          done

          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            dist-release/ready-for-agent-linux-x64 \
            dist-release/ready-for-agent-linux-arm64 \
            dist-release/ready-for-agent-darwin-x64 \
            dist-release/ready-for-agent-darwin-arm64
