schema {
  query: Query
  mutation: Mutation
}

scalar DateTime
scalar URI
scalar ID
scalar GitObjectID

type Query {
  repository(owner: String!, name: String!): Repository
}

type Mutation {
  markPullRequestReadyForReview(
    input: MarkPullRequestReadyForReviewInput!
  ): MarkPullRequestReadyForReviewPayload
  mergePullRequest(input: MergePullRequestInput!): MergePullRequestPayload
}

input MarkPullRequestReadyForReviewInput {
  pullRequestId: ID!
  clientMutationId: String
}

type MarkPullRequestReadyForReviewPayload {
  clientMutationId: String
  pullRequest: PullRequest
}

input MergePullRequestInput {
  pullRequestId: ID!
  expectedHeadOid: GitObjectID
  mergeMethod: PullRequestMergeMethod
  clientMutationId: String
}

enum PullRequestMergeMethod {
  MERGE
  SQUASH
  REBASE
}

enum MergeableState {
  CONFLICTING
  MERGEABLE
  UNKNOWN
}

type MergePullRequestPayload {
  clientMutationId: String
  pullRequest: PullRequest
}

type Repository {
  nameWithOwner: String!
  issues(first: Int, after: String, labels: [String!]): IssueConnection!
  issue(number: Int!): Issue
  pullRequests(
    first: Int
    states: [PullRequestState!]
    headRefName: String
  ): PullRequestConnection!
}

type PullRequestConnection {
  nodes: [PullRequest]
  pageInfo: PageInfo!
}

type PullRequest {
  id: ID!
  number: Int!
  url: URI!
  state: PullRequestState!
  merged: Boolean!
  isDraft: Boolean!
  headRefOid: String!
  baseRefName: String!
  mergeable: MergeableState!
  statusCheckRollup: StatusCheckRollup
  repository: Repository!
}

type StatusCheckRollup {
  state: StatusState!
  contexts(first: Int, after: String): StatusCheckRollupContextConnection!
}

type StatusCheckRollupContextConnection {
  nodes: [StatusCheckRollupContext]
  pageInfo: PageInfo!
}

union StatusCheckRollupContext = CheckRun | StatusContext

type CheckRun {
  id: ID!
  databaseId: Int
  name: String!
  status: CheckStatusState!
  conclusion: CheckConclusionState
  startedAt: DateTime
  completedAt: DateTime
}

type StatusContext {
  id: ID!
  context: String!
  state: StatusState!
  createdAt: DateTime!
}

enum PullRequestState {
  OPEN
  CLOSED
  MERGED
}

enum StatusState {
  EXPECTED
  ERROR
  FAILURE
  PENDING
  SUCCESS
}

enum CheckStatusState {
  QUEUED
  IN_PROGRESS
  COMPLETED
  WAITING
  PENDING
  REQUESTED
}

enum CheckConclusionState {
  ACTION_REQUIRED
  CANCELLED
  FAILURE
  NEUTRAL
  SUCCESS
  SKIPPED
  STALE
  TIMED_OUT
  STARTUP_FAILURE
}

type IssueConnection {
  nodes: [Issue]
  pageInfo: PageInfo!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
}

type Issue {
  number: Int!
  title: String!
  body: String!
  url: URI!
  createdAt: DateTime!
  state: IssueState!
  repository: Repository!
  parent: Issue
  subIssues(first: Int, after: String): IssueConnection!
  subIssuesSummary: SubIssuesSummary!
  blockedBy(first: Int, after: String): IssueConnection!
  closedByPullRequestsReferences(
    first: Int
    after: String
    includeClosedPrs: Boolean
  ): PullRequestConnection!
}

type SubIssuesSummary {
  total: Int!
}

enum IssueState {
  OPEN
  CLOSED
}
