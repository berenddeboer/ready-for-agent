schema {
  query: Query
  mutation: Mutation
}

scalar DateTime
scalar URI
scalar ID
scalar GitObjectID

type Query {
  repository(owner: String!, name: String!): Repository
  viewer: User!
}

type Mutation {
  markPullRequestReadyForReview(
    input: MarkPullRequestReadyForReviewInput!
  ): MarkPullRequestReadyForReviewPayload
  mergePullRequest(input: MergePullRequestInput!): MergePullRequestPayload
  addComment(input: AddCommentInput!): AddCommentPayload
  closeIssue(input: CloseIssueInput!): CloseIssuePayload
}

input AddCommentInput {
  subjectId: ID!
  body: String!
  clientMutationId: String
}

type AddCommentPayload {
  clientMutationId: String
  commentEdge: IssueCommentEdge
}

type IssueCommentEdge {
  node: IssueComment
}

input CloseIssueInput {
  issueId: ID!
  stateReason: IssueClosedStateReason
  clientMutationId: String
}

type CloseIssuePayload {
  clientMutationId: String
  issue: Issue
}

enum IssueClosedStateReason {
  COMPLETED
  NOT_PLANNED
  DUPLICATE
}

input MarkPullRequestReadyForReviewInput {
  pullRequestId: ID!
  clientMutationId: String
}

type MarkPullRequestReadyForReviewPayload {
  clientMutationId: String
  pullRequest: PullRequest
}

input MergePullRequestInput {
  pullRequestId: ID!
  expectedHeadOid: GitObjectID
  mergeMethod: PullRequestMergeMethod
  clientMutationId: String
}

enum PullRequestMergeMethod {
  MERGE
  SQUASH
  REBASE
}

enum MergeableState {
  CONFLICTING
  MERGEABLE
  UNKNOWN
}

type MergePullRequestPayload {
  clientMutationId: String
  pullRequest: PullRequest
}

type Repository {
  nameWithOwner: String!
  issues(first: Int, after: String, labels: [String!]): IssueConnection!
  issue(number: Int!): Issue
  pullRequests(
    first: Int
    states: [PullRequestState!]
    headRefName: String
  ): PullRequestConnection!
}

type PullRequestConnection {
  nodes: [PullRequest]
  pageInfo: PageInfo!
}

type PullRequest {
  id: ID!
  number: Int!
  url: URI!
  state: PullRequestState!
  merged: Boolean!
  isDraft: Boolean!
  headRefOid: String!
  baseRefName: String!
  mergeable: MergeableState!
  statusCheckRollup: StatusCheckRollup
  commits(last: Int): PullRequestCommitConnection!
  repository: Repository!
}

type PullRequestCommitConnection {
  nodes: [PullRequestCommit]
}

type PullRequestCommit {
  commit: Commit!
}

type Commit {
  oid: GitObjectID!
  pushedDate: DateTime
}

type StatusCheckRollup {
  state: StatusState!
  contexts(first: Int, after: String): StatusCheckRollupContextConnection!
}

type StatusCheckRollupContextConnection {
  nodes: [StatusCheckRollupContext]
  pageInfo: PageInfo!
}

union StatusCheckRollupContext = CheckRun | StatusContext

type CheckRun {
  id: ID!
  databaseId: Int
  name: String!
  status: CheckStatusState!
  conclusion: CheckConclusionState
  startedAt: DateTime
  completedAt: DateTime
}

type StatusContext {
  id: ID!
  context: String!
  state: StatusState!
  createdAt: DateTime!
}

enum PullRequestState {
  OPEN
  CLOSED
  MERGED
}

enum StatusState {
  EXPECTED
  ERROR
  FAILURE
  PENDING
  SUCCESS
}

enum CheckStatusState {
  QUEUED
  IN_PROGRESS
  COMPLETED
  WAITING
  PENDING
  REQUESTED
}

enum CheckConclusionState {
  ACTION_REQUIRED
  CANCELLED
  FAILURE
  NEUTRAL
  SUCCESS
  SKIPPED
  STALE
  TIMED_OUT
  STARTUP_FAILURE
}

type IssueConnection {
  nodes: [Issue]
  pageInfo: PageInfo!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
}

type Actor {
  login: String!
}

type User {
  login: String!
}

type Issue {
  id: ID!
  number: Int!
  title: String!
  body: String!
  url: URI!
  createdAt: DateTime!
  state: IssueState!
  author: Actor
  repository: Repository!
  parent: Issue
  comments(first: Int, after: String): IssueCommentConnection!
  subIssues(first: Int, after: String): IssueConnection!
  subIssuesSummary: SubIssuesSummary!
  blockedBy(first: Int, after: String): IssueConnection!
  closedByPullRequestsReferences(
    first: Int
    after: String
    includeClosedPrs: Boolean
  ): PullRequestConnection!
}

type IssueCommentConnection {
  nodes: [IssueComment]
  pageInfo: PageInfo!
}

type IssueComment {
  id: ID!
  body: String!
}

type SubIssuesSummary {
  total: Int!
}

enum IssueState {
  OPEN
  CLOSED
}
