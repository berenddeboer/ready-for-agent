schema {
  query: Query
}

scalar DateTime
scalar URI

type Query {
  repository(owner: String!, name: String!): Repository
}

type Repository {
  issues(first: Int, after: String, labels: [String!]): IssueConnection!
}

type IssueConnection {
  nodes: [Issue]
  pageInfo: PageInfo!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
}

type Issue {
  number: Int!
  title: String!
  body: String!
  url: URI!
  createdAt: DateTime!
  state: IssueState!
}

enum IssueState {
  OPEN
  CLOSED
}
