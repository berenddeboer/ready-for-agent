type Query {
  health: Boolean!
  repositories: [Repository!]!
  repositoryCredentials: [RepositoryCredential!]!
  config: Config!
  models: [String!]!
  issues(repositoryId: ID!): [Issue!]!
}

type Config {
  defaultModel: String!
  defaultVariant: String!
}

type Repository {
  id: ID!
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
  paused: Boolean!
  issuesReconciledAt: String
}

type RepositoryCredential {
  repositoryId: ID!
  configured: Boolean!
  githubTokenSecretName: String!
  githubTokenCreationUrl: String!
}

enum IssueState {
  OPEN
  CLOSED
}

type Issue {
  id: ID!
  repositoryId: ID!
  githubIssueNumber: Int!
  title: String!
  body: String!
  url: String!
  state: IssueState!
  githubCreatedAt: String!
  parent: IssueReference
  hasChildren: Boolean!
  blockedBy: [IssueReference!]!
}

type IssueReference {
  githubIssueNumber: Int!
  githubIssueUrl: String!
}

type RepositoryRefresh {
  fetched: Int!
  inserted: Int!
  updated: Int!
  deleted: Int!
  unchanged: Int!
}

input AddRepositoryInput {
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
}

input UpdateConfigInput {
  defaultModel: String!
  defaultVariant: String!
}

type Mutation {
  addRepository(input: AddRepositoryInput!): Repository!
  addRepositoryGitHubToken(repositoryId: ID!): RepositoryCredential!
  removeRepository(repositoryId: ID!): ID!
  refreshRepository(repositoryId: ID!): RepositoryRefresh!
  updateConfig(input: UpdateConfigInput!): Config!
}
