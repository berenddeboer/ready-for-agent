type Query {
  health: Boolean!
  repositories: [Repository!]!
}

type Repository {
  id: ID!
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
  paused: Boolean!
}

type RepositoryRefresh {
  fetched: Int!
  inserted: Int!
  updated: Int!
  deleted: Int!
  unchanged: Int!
}

input AddRepositoryInput {
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
}

type Mutation {
  addRepository(input: AddRepositoryInput!): Repository!
  refreshRepository(repositoryId: ID!): RepositoryRefresh!
}
