type Query {
  health: Boolean!
  repositories: [Repository!]!
  repositoryCredentials: [RepositoryCredential!]!
  config: Config!
  models: [String!]!
  issues(repositoryId: ID!): [Issue!]!
  workItems(repositoryId: ID!, githubIssueNumber: Int): [WorkItem!]!
}

type Config {
  defaultModel: String!
  defaultVariant: String!
  reviewModel: String
  reviewVariant: String
}

type Repository {
  id: ID!
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
  paused: Boolean!
  defaultModel: String
  defaultVariant: String
  reviewModel: String
  reviewVariant: String
  autoMerge: Boolean!
  issuesReconciledAt: String
}

type RepositoryCredential {
  repositoryId: ID!
  configured: Boolean!
  githubTokenSecretName: String!
  githubTokenCreationUrl: String!
}

enum IssueState {
  OPEN
  CLOSED
}

type Issue {
  id: ID!
  repositoryId: ID!
  githubIssueNumber: Int!
  title: String!
  body: String!
  url: String!
  state: IssueState!
  githubCreatedAt: String!
  parent: IssueReference
  hasChildren: Boolean!
  blockedBy: [IssueReference!]!
}

type IssueReference {
  githubIssueNumber: Int!
  githubIssueUrl: String!
}

type RefreshJob {
  id: ID!
  repositoryId: ID!
}

enum WorkItemState {
  CREATE_WORKTREE
  INSTALL_DEPENDENCIES
  IMPLEMENT
  PRE_COMMIT
  REVIEW
  COMMIT
  CREATE_PR
  WATCH_PR_STATUS_CHECKS
  RESOLVE_PR_MERGE_CONFLICT
  INVESTIGATE_PR_STATUS_CHECKS
  MARK_PR_READY_FOR_REVIEW
  DECIDE_PR_MERGE
  MERGE_PR
  LOCAL_CLEANUP
  COMPLETE
  FAILED
  ABANDONED
  NEEDS_HUMAN
}

enum WorkItemStatus {
  QUEUED
  RUNNING
  SUCCEEDED
  FAILED
  INTERRUPTED
  CANCELLED
  COMPLETE
  ABANDONED
  NEEDS_HUMAN
}

enum LifecyclePhase {
  CREATE_WORKTREE
  INSTALL_DEPENDENCIES
  IMPLEMENT
  PRE_COMMIT
  REVIEW
  COMMIT
  CREATE_PR
  RESOLVE_PR_MERGE_CONFLICT
  GITHUB_STATUS_CHECKS
  MARK_PR_READY_FOR_REVIEW
  DECIDE_PR_MERGE
  MERGE_PR
  LOCAL_CLEANUP
}

type LifecycleLabel {
  phase: LifecyclePhase!
  label: String!
  status: WorkItemStatus!
  """
  Execution duration in milliseconds; null when the step has not started.
  """
  durationMs: Float
}

type WorkItem {
  id: ID!
  repositoryId: ID!
  githubIssueNumber: Int!
  githubPullRequestNumber: Int
  model: String!
  variant: String!
  state: WorkItemState!
  stateLabel: String!
  status: WorkItemStatus!
  statusLabel: String!
  statusMessage: String
  canRetry: Boolean!
  isTerminal: Boolean!
  stateReadyAt: String!
  worktreePath: String
  sessionId: String
  failureCode: String
  createdAt: String!
  updatedAt: String!
  stateResidenceMs: Float!
  lifecycleLabels: [LifecycleLabel!]!
}

input AddRepositoryInput {
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
}

input UpdateConfigInput {
  defaultModel: String!
  defaultVariant: String!
  reviewModel: String
  reviewVariant: String
}

input UpdateRepositorySettingsInput {
  repositoryId: ID!
  paused: Boolean!
  defaultModel: String
  defaultVariant: String
  reviewModel: String
  reviewVariant: String
  autoMerge: Boolean!
}

type Mutation {
  addRepository(input: AddRepositoryInput!): Repository!
  addRepositoryGitHubToken(repositoryId: ID!): RepositoryCredential!
  removeRepositoryGitHubToken(repositoryId: ID!): RepositoryCredential!
  removeRepository(repositoryId: ID!): ID!
  refreshRepository(repositoryId: ID!): RefreshJob!
  implementNow(repositoryId: ID!, githubIssueNumber: Int!): WorkItem!
  retryWorkItem(workItemId: ID!): WorkItem!
  resetWorkItem(workItemId: ID!): ID!
  updateConfig(input: UpdateConfigInput!): Config!
  updateRepositorySettings(input: UpdateRepositorySettingsInput!): Repository!
}

type Subscription {
  repositoriesChanged: Boolean!
  issuesChanged(repositoryId: ID!): Boolean!
  repositoryIssuesChanged: ID!
}
