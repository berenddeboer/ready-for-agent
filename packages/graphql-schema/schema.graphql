type Query {
  health: Boolean!
  """
  Suggested CLI to add a local repository from the blank-slate empty state.
  Uses `ready-for-agent` when that binary is on PATH; otherwise `npx ready-for-agent`.
  """
  addRepositoryCommand: String!
  repositories: [Repository!]!
  repositoryCredentials: [RepositoryCredential!]!
  config: Config!
  """
  Built-in Agent Backends available for Harness Config selection.
  """
  agentBackends: [AgentBackendInfo!]!
  """
  Selected backend, Active backend, readiness/restart state, actionable reason,
  and the instance-wide model catalog from the latest successful inspection.
  """
  agentBackendStatus: AgentBackendStatus!
  """
  Agent Models available from the Active Agent Backend, each with optional
  Thinking Levels. Empty thinkingLevels means the model has no Thinking Levels.
  Empty when the backend is unavailable.
  """
  models: [AgentModel!]!
  issues(repositoryId: ID!): [Issue!]!
  """
  Work Items for a repository (or one issue when githubIssueNumber is set).
  Omit listKind/limit for the full list (backward-compatible default).
  listKind WORKING: unfinished Work Items (including retryable failed or
  interrupted Step Runs) plus Needs Human (no history cap from the Jobs card).
  listKind FAILED: non-retryable terminal failures only, newest createdAt first.
  Pass limit (e.g. 15) to bound Failed history — independent of the Completed limit.
  listKind COMPLETED: Complete and Abandoned only, newest createdAt first;
  pass limit (e.g. 15) to bound finished history. Terminal failed is not included.
  """
  workItems(
    repositoryId: ID!
    githubIssueNumber: Int
    listKind: WorkItemsListKind
    limit: Int
  ): [WorkItem!]!
  """
  Count of unique Work Items that committed a pull request in [from, to).
  A Work Item counts when it has a non-null GitHub PR number and at least one
  successful commit Step Run whose finished_at falls in the half-open range.
  `from` and `to` are ISO-8601 instants (browser local calendar-day boundaries).
  Counts across all repositories; not limited by Jobs card filters or limits.
  """
  committedPullRequestsCount(from: String!, to: String!): Int!
  """
  Session Telemetry for a Work Item. Authorizes ownership, uses captured
  backend provenance, and dispatches to the owning backend's optional provider.
  Returns null when the Work Item does not exist. Availability may be
  AVAILABLE, MISSING, UNAVAILABLE, or UNSUPPORTED; metric fields are null
  unless AVAILABLE.
  """
  session(workItemId: ID!): Session
}

"""
Whether Session Telemetry can be loaded for a Work Item Session.
UNSUPPORTED means the backend does not provide telemetry (distinct from MISSING).
"""
enum SessionAvailability {
  AVAILABLE
  MISSING
  UNAVAILABLE
  UNSUPPORTED
}

type SessionModel {
  providerId: String!
  id: String!
  thinkingLevel: String
}

type SessionTokens {
  input: Int!
  output: Int!
  reasoning: Int!
  cacheRead: Int!
  cacheWrite: Int!
}

type AgentBackendInfo {
  id: String!
  label: String!
}

"""
Instance-wide Agent Backend readiness for Settings and lifecycle guards.
"""
type AgentBackendStatus {
  selectedBackend: AgentBackendInfo!
  activeBackend: AgentBackendInfo!
  """
  ready | unavailable | restart_required
  """
  kind: AgentBackendStatusKind!
  reason: String
  models: [AgentModel!]!
}

enum AgentBackendStatusKind {
  READY
  UNAVAILABLE
  RESTART_REQUIRED
}

"""
Session Telemetry totals for a Work Item Session.
"""
type Session {
  id: String!
  availability: SessionAvailability!
  backend: AgentBackendInfo!
  model: SessionModel
  tokens: SessionTokens
  cost: Float
  createdAt: String
  updatedAt: String
}

"""
Jobs card partition: Working / Failed / Completed membership.
"""
enum WorkItemsListKind {
  WORKING
  FAILED
  COMPLETED
}

type Config {
  """
  Agent Backend selected for the next Harness startup.
  """
  selectedAgentBackend: String!
  defaultModel: String
  defaultThinkingLevel: String
  reviewModel: String
  reviewThinkingLevel: String
  maxConcurrentAgentTurns: Int!
  maxConcurrentWorkItems: Int!
}

type AgentModel {
  id: String!
  """
  Thinking Levels supported by this model, e.g. low, high, xhigh.
  Empty when the model has no Thinking Levels.
  """
  thinkingLevels: [String!]!
}

type Repository {
  id: ID!
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
  paused: Boolean!
  defaultModel: String
  defaultThinkingLevel: String
  reviewModel: String
  reviewThinkingLevel: String
  autoMerge: Boolean!
  includeAllIssueAuthors: Boolean!
  issuesReconciledAt: String
}

type RepositoryCredential {
  repositoryId: ID!
  configured: Boolean!
  githubTokenSecretName: String!
  githubTokenCreationUrl: String!
}

enum IssueState {
  OPEN
  CLOSED
}

type Issue {
  id: ID!
  repositoryId: ID!
  githubIssueNumber: Int!
  title: String!
  body: String!
  url: String!
  state: IssueState!
  githubCreatedAt: String!
  issueAuthor: String
  parent: IssueReference
  hasChildren: Boolean!
  blockedBy: [IssueReference!]!
}

type IssueReference {
  githubIssueNumber: Int!
  githubIssueUrl: String!
}

type RefreshJob {
  id: ID!
  repositoryId: ID!
}

enum WorkItemState {
  CREATE_WORKTREE
  INSTALL_DEPENDENCIES
  IMPLEMENT
  ASSESS_CHANGES
  PRE_COMMIT
  REVIEW
  COMMIT
  CREATE_PR
  WATCH_PR_STATUS_CHECKS
  RESOLVE_PR_MERGE_CONFLICT
  INVESTIGATE_PR_STATUS_CHECKS
  MARK_PR_READY_FOR_REVIEW
  DECIDE_PR_MERGE
  MERGE_PR
  CLOSE_ISSUE
  LOCAL_CLEANUP
  COMPLETE
  FAILED
  ABANDONED
  NEEDS_HUMAN
}

enum WorkItemStatus {
  QUEUED
  RUNNING
  SUCCEEDED
  FAILED
  INTERRUPTED
  CANCELLED
  COMPLETE
  ABANDONED
  NEEDS_HUMAN
  NEEDS_HUMAN_REVIEW
  WAITING_FOR_WORKER_SLOT
}

enum LifecyclePhase {
  CREATE_WORKTREE
  INSTALL_DEPENDENCIES
  IMPLEMENT
  ASSESS_CHANGES
  PRE_COMMIT
  REVIEW
  COMMIT
  CREATE_PR
  RESOLVE_PR_MERGE_CONFLICT
  GITHUB_STATUS_CHECKS
  MARK_PR_READY_FOR_REVIEW
  DECIDE_PR_MERGE
  MERGE_PR
  CLOSE_ISSUE
  LOCAL_CLEANUP
}

type LifecycleLabel {
  phase: LifecyclePhase!
  label: String!
  status: WorkItemStatus!
  """
  Execution duration in milliseconds; null when the step has not started.
  """
  durationMs: Float
}

type WorkItem {
  id: ID!
  repositoryId: ID!
  githubIssueNumber: Int!
  issueTitle: String
  githubPullRequestNumber: Int
  """
  Active Agent Backend captured at Work Item creation (provenance).
  """
  agentBackend: AgentBackendInfo!
  state: WorkItemState!
  stateLabel: String!
  status: WorkItemStatus!
  statusLabel: String!
  statusMessage: String
  paused: Boolean!
  canRetry: Boolean!
  isTerminal: Boolean!
  stateReadyAt: String!
  worktreePath: String
  startingCommitOid: String
  """
  Markdown completion summary for a No-Change Outcome; null when the Work Item
  produced repository changes or has not confirmed no-change yet.
  """
  completionSummary: String
  sessionId: String
  failureCode: String
  createdAt: String!
  updatedAt: String!
  stateResidenceMs: Float!
  lifecycleLabels: [LifecycleLabel!]!
}

input AddRepositoryInput {
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
}

input UpdateConfigInput {
  selectedAgentBackend: String!
  """
  Required when not changing Agent Backend. Ignored (cleared) when the backend changes.
  """
  defaultModel: String
  defaultThinkingLevel: String
  reviewModel: String
  reviewThinkingLevel: String
  maxConcurrentAgentTurns: Int!
  maxConcurrentWorkItems: Int!
}

input UpdateRepositorySettingsInput {
  repositoryId: ID!
  paused: Boolean!
  defaultModel: String
  defaultThinkingLevel: String
  reviewModel: String
  reviewThinkingLevel: String
  autoMerge: Boolean!
  includeAllIssueAuthors: Boolean!
}

type Mutation {
  addRepository(input: AddRepositoryInput!): Repository!
  addRepositoryGitHubToken(repositoryId: ID!): RepositoryCredential!
  removeRepository(repositoryId: ID!): ID!
  refreshRepository(repositoryId: ID!): RefreshJob!
  implementNow(repositoryId: ID!, githubIssueNumber: Int!): WorkItem!
  """
  Create a Work Item that runs local steps through Review, then pauses before Commit.
  """
  implementLocally(repositoryId: ID!, githubIssueNumber: Int!): WorkItem!
  retryWorkItem(workItemId: ID!): WorkItem!
  pauseWorkItem(workItemId: ID!): WorkItem!
  startWorkItem(workItemId: ID!): WorkItem!
  resetWorkItem(workItemId: ID!): ID!
  updateConfig(input: UpdateConfigInput!): Config!
  """
  Revalidate the Active Agent Backend and refresh its model catalog.
  """
  recheckAgentBackend: AgentBackendStatus!
  updateRepositorySettings(input: UpdateRepositorySettingsInput!): Repository!
  pauseRepository(repositoryId: ID!): Repository!
  unpauseRepository(repositoryId: ID!): Repository!
}

type Subscription {
  repositoriesChanged: Boolean!
  issuesChanged(repositoryId: ID!): Boolean!
  repositoryIssuesChanged: ID!
  repositoryWorkItemsChanged: ID!
}
