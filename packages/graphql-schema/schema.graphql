type Query {
  health: Boolean!
  repositories: [Repository!]!
  repositoryCredentials: [RepositoryCredential!]!
  config: Config!
  models: [String!]!
  issues(repositoryId: ID!): [Issue!]!
  workItems(repositoryId: ID!, githubIssueNumber: Int): [WorkItem!]!
}

type Config {
  defaultModel: String!
  defaultVariant: String!
}

type Repository {
  id: ID!
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
  paused: Boolean!
  issuesReconciledAt: String
}

type RepositoryCredential {
  repositoryId: ID!
  configured: Boolean!
  githubTokenSecretName: String!
  githubTokenCreationUrl: String!
}

enum IssueState {
  OPEN
  CLOSED
}

type Issue {
  id: ID!
  repositoryId: ID!
  githubIssueNumber: Int!
  title: String!
  body: String!
  url: String!
  state: IssueState!
  githubCreatedAt: String!
  parent: IssueReference
  hasChildren: Boolean!
  blockedBy: [IssueReference!]!
}

type IssueReference {
  githubIssueNumber: Int!
  githubIssueUrl: String!
}

type RefreshJob {
  id: ID!
  repositoryId: ID!
}

enum WorkItemState {
  CREATE_WORKTREE
  INSTALL_DEPENDENCIES
  IMPLEMENT
  PRE_COMMIT
  REVIEW
  COMPLETE
  FAILED
  ABANDONED
}

enum StepRunStatus {
  QUEUED
  RUNNING
  SUCCEEDED
  FAILED
  INTERRUPTED
  CANCELLED
}

type StepRun {
  id: ID!
  step: WorkItemState!
  status: StepRunStatus!
  queuedAt: String!
  startedAt: String
  finishedAt: String
  reasonCode: String
  reasonMessage: String
  queueWaitMs: Float!
  executionDurationMs: Float
}

type WorkItem {
  id: ID!
  repositoryId: ID!
  githubIssueNumber: Int!
  model: String!
  variant: String!
  state: WorkItemState!
  stateReadyAt: String!
  worktreePath: String
  sessionId: String
  failureCode: String
  failureMessage: String
  createdAt: String!
  updatedAt: String!
  stateResidenceMs: Float!
  stepRuns: [StepRun!]!
}

input AddRepositoryInput {
  githubOwner: String!
  githubRepo: String!
  localPath: String!
  isBare: Boolean!
}

input UpdateConfigInput {
  defaultModel: String!
  defaultVariant: String!
}

type Mutation {
  addRepository(input: AddRepositoryInput!): Repository!
  addRepositoryGitHubToken(repositoryId: ID!): RepositoryCredential!
  removeRepository(repositoryId: ID!): ID!
  refreshRepository(repositoryId: ID!): RefreshJob!
  implementNow(repositoryId: ID!, githubIssueNumber: Int!): WorkItem!
  retryWorkItem(workItemId: ID!): WorkItem!
  resetWorkItem(workItemId: ID!): ID!
  updateConfig(input: UpdateConfigInput!): Config!
}

type Subscription {
  repositoriesChanged: Boolean!
  issuesChanged(repositoryId: ID!): Boolean!
  repositoryIssuesChanged: ID!
}
